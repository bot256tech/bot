<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(160deg,#0d3b0d 0%,#1B5E20 40%,#2E7D32 100%);position:relative;overflow:hidden}

.features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px;text-align:left}
.feature{display:flex;align-items:center;gap:10px;padding:12px;background:#F8F9FA;border-radius:14px}
.feature-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.feature-icon.green{background:#E8F5E9;color:#1B5E20}

.feature-icon.blue{background:#E3F2FD;color:#1565C0}

.download-btn-secondary:hover{border-color:#1B5E20;background:#F1F8E9}

.qr-section{margin-top:24px;padding:20px;background:#F8F9FA;border-radius:16px}
.qr-section p{font-size:13px;color:#888;margin-bottom:12px}
.qr-box{width:120px;height:120px;background:white;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 4px 12px rgba(0,0,0,.08)}

.coming-soon{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#FFF8E1;border-radius:50px;font-size:12px;font-weight:600;color:#B8960C;margin-top:12px}

.back-link{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:14px;text-decoration:none;margin-top:24px;transition:color .2s}

.rating{display:flex;align-items:center;gap:4px;justify-content:center;margin-bottom:8px}

.rating-text{font-size:13px;color:#888;margin-left:4px}

@media(max-width:480px){
  .app-card{padding:32px 24px}
  .features{grid-template-columns:1fr}

</style>
</head>
