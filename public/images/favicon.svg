<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8960C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1B5E20"/>
  <!-- Wheat stalk -->
  <g transform="translate(256,270)">
    <!-- Stem -->
    <line x1="0" y1="100" x2="0" y2="-140" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
    <!-- Left grains -->
    <ellipse cx="-30" cy="-30" rx="20" ry="36" transform="rotate(-25,-30,-30)" fill="url(#gold)"/>
    <ellipse cx="-24" cy="-80" rx="17" ry="30" transform="rotate(-20,-24,-80)" fill="url(#gold)"/>
    <ellipse cx="-16" cy="-120" rx="13" ry="24" transform="rotate(-15,-16,-120)" fill="url(#gold)"/>
    <!-- Right grains -->
    <ellipse cx="30" cy="-45" rx="20" ry="36" transform="rotate(25,30,-45)" fill="url(#gold)"/>
    <ellipse cx="24" cy="-95" rx="17" ry="30" transform="rotate(20,24,-95)" fill="url(#gold)"/>
    <ellipse cx="16" cy="-130" rx="13" ry="24" transform="rotate(15,16,-130)" fill="url(#gold)"/>
    <!-- Top grain -->
    <ellipse cx="0" cy="-155" rx="11" ry="20" fill="url(#gold)"/>
    <!-- Small leaves at base -->
    <path d="M-8,100 Q-30,75 -5,65" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M8,100 Q30,75 5,65" stroke="url(#gold)" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
